name: pipeline1
	on:
		push:
			branches:
				-main

jobs:
	job1:
		runs-on: ubuntu-latest
		steps:
			-name: Checkout Code
			 uses: action/checkout@v2
			 name: print message
			 run: echo 'Job1'

	job2:
		runs-on: ubuntu-latest
		needs: job1
		steps:
			-name: Checkout Code
			 uses: action/checkout@v2
			 name: print message
			 run: echo 'Job2'

	job3:
		runs-on: ubuntu-latest
		needs: job1
		steps:
			-name: Checkout Code
			 uses: action/checkout@v2
			 name: print message
			 run: echo 'Job3'

	job4:
		runs-on: ubuntu-latest
		needs: job2
		steps:
			-name: Checkout Code
			 uses: action/checkout@v2
			 name: print message
			 run: echo 'Job4'

	job5:
		runs-on: ubuntu-latest
		needs: job3
		steps:
			-name: Checkout Code
			 uses: action/checkout@v2
			 name: print message
			 run: echo 'Job5'

	job6:
		runs-on: ubuntu-latest
		needs: [job4, job5]
		steps:
			-name: Checkout Code
			 uses: action/checkout@v2
			 name: print message
			 run: echo 'Job6'

	job7:
		runs-on: ubuntu-latest
		needs: job6
		steps:
			-name: Checkout Code
			 uses: action/checkout@v2
			 name: print message
			 run: echo 'Job7'

	job8:
		runs-on: ubuntu-latest
		needs: job7
		steps:
			-name: Checkout Code
			 uses: action/checkout@v2
			 name: print message
			 run: echo 'Job8'

	job9:
		runs-on: ubuntu-latest
		needs: job7
		steps:
			-name: Checkout Code
			 uses: action/checkout@v2
			 name: print message
			 run: echo 'Job9'

	job10:
		runs-on: ubuntu-latest
		needs: [job8, Job9}
		steps:
			-name: Checkout Code
			 uses: action/checkout@v2
			 name: print message
			 run: echo 'Job10'
